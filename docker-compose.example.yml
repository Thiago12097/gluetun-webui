name: gluetun-webui

# ============================================================================
# OPTION A1: Single Instance (Recommended)
# Point this webui to a single gluetun container on the same network
# ============================================================================

services:
  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      # Uncomment if Gluetun auth is enabled:
      #- GLUETUN_API_KEY=yourtoken
      #- GLUETUN_USER=username
      #- GLUETUN_PASSWORD=password
      # Set to 'true' if behind a reverse proxy (nginx, Traefik, etc.)
      #- TRUST_PROXY=false
    
    networks:
      - gluetun-stack
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
networks:
  gluetun-stack:
    driver: bridge


# ============================================================================
# OPTION A2 (commented): Multiple Instances
# Uncomment and configure below to monitor 2+ gluetun instances
